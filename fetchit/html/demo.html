<!DOCTYPE html>
<html>
<head>
    <title>Demo Web (Raw Method)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e40af;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        .info { font-size: 1.2em; margin: 10px 0; }
        .method { background-color: rgba(255,255,255,0.2); padding: 10px; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Demo Web (Raw Method)</h1>
        <div class="info">Container Name: demo-web</div>
        <div class="info">Port: 8080</div>
        <div class="info">Deployment Method: raw</div>
        <div class="info">Image Version: 0.9</div>
        <div class="method">
            <strong>GitOps Demo</strong><br>
            This container was deployed using raw method<br>
            Managed by FetchIt GitOps
        </div>
        <div class="info">
            <small>Last updated: $(date)</small>
        </div>
    </div>
</body>
</html>
